<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エンキャリAI</title>

<!-- Google Fonts: Sora -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: { sora: ["Sora", "sans-serif"] },
        colors: {
          background:  "hsl(var(--background) / <alpha-value>)",
          foreground:  "hsl(var(--foreground) / <alpha-value>)",
          primary:     { DEFAULT: "hsl(var(--primary) / <alpha-value>)",   foreground: "hsl(var(--primary-foreground) / <alpha-value>)" },
          secondary:   { DEFAULT: "hsl(var(--secondary) / <alpha-value>)", foreground: "hsl(var(--secondary-foreground) / <alpha-value>)" },
          muted:       { DEFAULT: "hsl(var(--muted) / <alpha-value>)",     foreground: "hsl(var(--muted-foreground) / <alpha-value>)" },
          accent:      { DEFAULT: "hsl(var(--accent) / <alpha-value>)",    foreground: "hsl(var(--accent-foreground) / <alpha-value>)" },
          destructive: "hsl(var(--destructive) / <alpha-value>)",
          border:      "hsl(var(--border) / <alpha-value>)",
          input:       "hsl(var(--input) / <alpha-value>)",
          ring:        "hsl(var(--ring) / <alpha-value>)",
          "nav-button":"hsl(var(--nav-button) / <alpha-value>)",
          "hero-bg":   "hsl(var(--hero-bg) / <alpha-value>)",
        },
        borderRadius: {
          lg: "var(--radius)",
          md: "calc(var(--radius) - 2px)",
          sm: "calc(var(--radius) - 4px)",
        },
        keyframes: {
          "fade-up": {
            "0%":   { opacity: "0", transform: "translateY(20px)", filter: "blur(4px)" },
            "100%": { opacity: "1", transform: "translateY(0)",    filter: "blur(0)" },
          },
          "fade-in": {
            "0%":   { opacity: "0" },
            "100%": { opacity: "1" },
          },
        },
        animation: {
          "fade-up": "fade-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards",
          "fade-in": "fade-in 0.5s ease-out forwards",
        },
      },
    },
  };
</script>

<!-- Spline viewer (non-React runtime) -->
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.48/build/spline-viewer.js"></script>

<style>
  :root {
    --background: 0 0% 10%;
    --foreground: 0 0% 96%;
    --primary: 119 99% 46%;
    --primary-foreground: 0 0% 4%;
    --secondary: 0 0% 18%;
    --secondary-foreground: 0 0% 96%;
    --muted: 0 0% 16%;
    --muted-foreground: 0 0% 60%;
    --accent: 119 99% 46%;
    --accent-foreground: 0 0% 4%;
    --destructive: 0 84% 60%;
    --border: 0 0% 20%;
    --input: 0 0% 20%;
    --ring: 119 99% 46%;
    --radius: 0.5rem;
    --nav-button: 0 0% 18%;
    --hero-bg: 0 0% 8%;
  }
  html, body { margin: 0; padding: 0; }
  /* Spline viewer fills its container; hide its default logo badge for a clean hero */
  spline-viewer { width: 100%; height: 100%; display: block; }
  spline-viewer::part(logo) { display: none; }
</style>
</head>

<body class="font-sora antialiased bg-hero-bg text-foreground">

<div class="bg-hero-bg min-h-screen">

  <!-- ================= NAVBAR ================= -->
  <nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 lg:px-16 py-5">
    <!-- Left: logo -->
    <a href="#" class="text-foreground text-xl font-semibold tracking-tight">エンキャリ</a>

    <!-- Right: 管理者ログイン (navCta variant) -->

    <!-- Dark overlay -->
    <div class="absolute inset-0 bg-black/30 z-[1] pointer-events-none"></div>

    <!-- Content (bottom-left) -->
    <div class="relative z-10 pointer-events-none w-full max-w-[90%] sm:max-w-md lg:max-w-2xl px-6 md:px-10 pb-10 md:pb-10 pt-32">

      <h1 class="opacity-0 animate-fade-up text-[clamp(3rem,8vw,6rem)] font-bold leading-[1.05] tracking-[-0.05em] text-foreground mb-2 md:mb-4 uppercase" style="animation-delay: 0.2s">
        エンキャリ<span class="text-primary"> AI</span>

        AIが企業をリサーチし、学生一人ひとりの体験から“その人らしいES”を作成・添削。新卒も中途も、エンタメ業界の選考を最短で、正しく突破する。
      </p>

      <div class="opacity-0 animate-fade-up mb-3" style="animation-delay: 0.62s">

      <div class="opacity-0 animate-fade-up flex flex-col sm:flex-row flex-wrap gap-3" style="animation-delay: 0.7s">

          <div class="flex-1">
            <div class="flex items-center gap-2">
              <span class="text-foreground text-base font-bold">エンターテイメントキャリア</span>
              <span class="text-primary text-[10px] font-bold border border-primary/50 rounded px-1.5 py-0.5">就活ES</span>
            </div>
            <div class="text-muted-foreground text-xs font-light mt-1">企業リサーチ ＆ ES添削（新卒・中途）</div>
          </div>

        <!-- サービス② 職務経歴書 添削AI -->

          <div class="flex-1">
            <div class="flex items-center gap-2">
              <span class="text-foreground text-base font-bold">職務経歴書 添削AI</span>
              <span class="text-primary text-[10px] font-bold border border-primary/50 rounded px-1.5 py-0.5">中途</span>
            </div>
            <div class="text-muted-foreground text-xs font-light mt-1">職務経歴書をAIが自動で添削・改善</div>
          </div>
          <span class="text-muted-foreground group-hover:text-primary group-hover:translate-x-1 transition-all text-xl">↗</span>
        </a>

      </div>

      <p class="opacity-0 animate-fade-up text-muted-foreground/60 text-xs font-light mt-4 md:mt-6" style="animation-delay: 0.85s">
        エンタメ業界特化の就活支援パートナー。AI×現場の知見で内定へ。
      </p>

    </div>
  </section>

</div>
</body>
</html>
